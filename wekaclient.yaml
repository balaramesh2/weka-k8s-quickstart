apiVersion: weka.weka.io/v1alpha1
kind: WekaClient
metadata:
  name: cluster1-client
  namespace: weka-operator-system
spec:
  image: quay.io/weka.io/weka-in-container:${WEKA_IMAGE_VERSION}
  imagePullSecret: "quay-io-robot-secret" # Replace with the actual value
  driversDistService: "https://drivers.weka.io"
  portRange:
    basePort: 46000
  wekaSecretRef: weka-client-cluster1 # Must match secret name created using secret yaml
  targetCluster:
    name: cluster1
    namespace: weka-operator-system 
