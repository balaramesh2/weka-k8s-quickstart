apiVersion: weka.weka.io/v1alpha1
kind: WekaCluster
metadata:
  name: cluster1
  namespace: weka-operator-system
spec:
  template: dynamic
  dynamicTemplate:
    computeContainers: 6
    driveContainers: 6
    numDrives: 1
  image: quay.io/weka.io/weka-in-container:${WEKA_IMAGE_VERSION} # Replace with actual image tag
  driversDistService: "https://drivers.weka.io"
  imagePullSecret: "quay-io-robot-secret" # Replace with the actual secret
