apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
  name: pvc-weka
  namespace: default
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: weka-cluster1-weka-operator-system-default
  volumeMode: Filesystem
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-weka
  namespace: default
spec:
  volumes:
  - name: vol1
    persistentVolumeClaim:
      claimName: pvc-weka
  containers:
  - name: busybox
    image: busybox
    command: [ "sh", "-c", "sleep 1h" ]
    volumeMounts:
    - name: vol1
      mountPath: /data/demo
